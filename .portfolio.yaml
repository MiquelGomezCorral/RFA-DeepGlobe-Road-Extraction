title:
  en: DeepGlobe Road Extraction
  es: Extracción de Carreteras DeepGlobe
finished: finished
descriptionShort:
  en: "Road segmentation on the DeepGlobe dataset using two approaches: UNet with segmentation_models_pytorch and SegFormer (ViT-based from HuggingFace). Includes CLI for dataset generation, training, and testing. Full report in the project notebook."
  es: "Segmentación de carreteras sobre el dataset DeepGlobe usando dos enfoques: UNet con segmentation_models_pytorch y SegFormer (basado en ViT de HuggingFace). Incluye CLI para generación de dataset, entrenamiento y test. Memoria completa en el notebook del proyecto."
descriptionLong:
  en: |
    Semantic segmentation project for road extraction from satellite imagery using the DeepGlobe Road Extraction dataset. Implements and compares two model architectures: (1) UNet-based segmentation model from segmentation_models_pytorch with various backbones, (2) SegFormer (nvidia/segformer-b0-finetuned-ade-512-512), a ViT-based semantic segmentation model from HuggingFace Transformers. The full pipeline includes dataset preprocessing, model training with configurable hyperparameters, and testing/evaluation. All experiments and results are documented in a comprehensive Jupyter notebook that serves as the project report.
  es: |
    Proyecto de segmentación semántica para extracción de carreteras desde imágenes satelitales usando el dataset DeepGlobe Road Extraction. Implementa y compara dos arquitecturas: (1) Modelo de segmentación basado en UNet de segmentation_models_pytorch con varios backbones, (2) SegFormer (nvidia/segformer-b0-finetuned-ade-512-512), un modelo de segmentación semántica basado en ViT de HuggingFace Transformers. El pipeline completo incluye preprocesado de dataset, entrenamiento con hiperparámetros configurables, y test/evaluación. Todos los experimentos y resultados están documentados en un notebook Jupyter exhaustivo que sirve como memoria del proyecto.
